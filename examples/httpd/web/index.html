<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active SLAM 监控系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1419 100%);
            color: #e0e6ed;
            overflow: hidden;
            height: 100vh;
        }
        
        .container {
            display: grid;
            grid-template-columns: 300px 1fr 350px;
            grid-template-rows: 60px 1fr 200px;
            gap: 12px;
            padding: 12px;
            height: 100vh;
        }
        
        .header {
            grid-column: 1 / -1;
            background: rgba(15, 20, 35, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 157, 0.2);
            border-radius: 8px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0, 255, 157, 0.1);
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #00ff9d;
            text-shadow: 0 0 20px rgba(0, 255, 157, 0.5);
            letter-spacing: 2px;
        }
        
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0, 255, 157, 0.1);
            border: 1px solid rgba(0, 255, 157, 0.3);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff9d;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        
        .panel {
            background: rgba(15, 20, 35, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 157, 0.15);
            border-radius: 8px;
            padding: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .panel-title {
            font-size: 14px;
            font-weight: 700;
            color: #00ff9d;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 1px solid rgba(0, 255, 157, 0.2);
            padding-bottom: 8px;
        }
        
        .device-list {
            grid-row: 2 / 4;
        }
        
        .map-container {
            position: relative;
            background: #0a0e1a;
            border: 2px solid rgba(0, 255, 157, 0.3);
            border-radius: 4px;
            overflow: hidden;
        }
        
        #mapCanvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }
        
        .info-panel {
            grid-row: 2 / 3;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .camera-panel {
            grid-row: 3 / 4;
            grid-column: 2 / 3;
        }
        
        .telemetry-panel {
            grid-row: 3 / 4;
        }
        
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .metric-label {
            color: #8892a6;
            font-size: 12px;
        }
        
        .metric-value {
            color: #00ff9d;
            font-weight: 600;
            font-size: 14px;
        }
        
        .device-item {
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(0, 255, 157, 0.05);
            border: 1px solid rgba(0, 255, 157, 0.1);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .device-item:hover {
            background: rgba(0, 255, 157, 0.15);
            border-color: rgba(0, 255, 157, 0.4);
            transform: translateX(4px);
        }
        
        .device-item.active {
            background: rgba(0, 255, 157, 0.2);
            border-color: #00ff9d;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.3);
        }
        
        .device-name {
            font-weight: 600;
            color: #00ff9d;
            margin-bottom: 4px;
        }
        
        .device-status {
            font-size: 11px;
            color: #8892a6;
        }
        
        .progress-bar {
            width: 100%;
            height: 24px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            margin-top: 8px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff9d, #00d4ff);
            transition: width 0.5s ease;
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.5);
        }
        
        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 11px;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 4px rgba(0, 0, 0, 0.8);
        }
        
        #cameraView {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
            border-radius: 4px;
        }
        
        .frontier-marker {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #ff0080;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #ff0080;
            animation: glow 1.5s infinite;
        }
        
        @keyframes glow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .no-data {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #8892a6;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ ACTIVE SLAM</h1>
            <div class="status-badge">
                <div class="status-dot"></div>
                <span id="connectionStatus">连接中...</span>
            </div>
        </div>
        
        <div class="panel device-list">
            <div class="panel-title">设备列表</div>
            <div id="deviceList">
                <div class="no-data">等待设备连接...</div>
            </div>
        </div>
        
        <div class="panel map-container">
            <canvas id="mapCanvas"></canvas>
        </div>
        
        <div class="panel info-panel">
            <div class="panel-title">实时状态</div>
            <div id="telemetryInfo">
                <div class="metric">
                    <span class="metric-label">位置 X</span>
                    <span class="metric-value" id="posX">0.00 m</span>
                </div>
                <div class="metric">
                    <span class="metric-label">位置 Y</span>
                    <span class="metric-value" id="posY">0.00 m</span>
                </div>
                <div class="metric">
                    <span class="metric-label">航向角</span>
                    <span class="metric-value" id="yaw">0.00°</span>
                </div>
                <div class="metric">
                    <span class="metric-label">速度</span>
                    <span class="metric-value" id="velocity">0.00 m/s</span>
                </div>
                <div class="metric">
                    <span class="metric-label">电池</span>
                    <span class="metric-value" id="battery">100%</span>
                </div>
                <div class="metric">
                    <span class="metric-label">信号</span>
                    <span class="metric-value" id="signal">100%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="coverageBar" style="width: 0%"></div>
                    <div class="progress-text" id="coverageText">覆盖率: 0%</div>
                </div>
            </div>
        </div>
        
        <div class="panel camera-panel">
            <div class="panel-title">相机视图</div>
            <img id="cameraView" alt="Camera Feed">
        </div>
        
        <div class="panel telemetry-panel">
            <div class="panel-title">探索边界</div>
            <div id="frontierList">
                <div class="no-data">暂无探索边界</div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
